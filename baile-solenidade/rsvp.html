<script>
        document.addEventListener('DOMContentLoaded', function () {
          const optionLabels = Array.from(document.querySelectorAll('label')).filter(function (label) {
            return label.querySelector('input[type="radio"]');
          });

          function updateSelectionStyles() {
            optionLabels.forEach(function (label) {
              const radio = label.querySelector('input[type="radio"]');
              const indicator = label.querySelector('div.w-5.h-5');
              const dot = indicator ? indicator.querySelector('div') : null;
              const outline = label.querySelector('.absolute.inset-0.rounded-xl.border-2');

              if (!radio) {
                return;
              }

              if (radio.checked) {
                label.style.backgroundColor = 'rgba(32, 57, 52, 0.92)';
                label.style.borderColor = 'rgba(233, 193, 118, 0.28)';
                label.style.boxShadow = '0 0 0 1px rgba(233, 193, 118, 0.12)';
                if (indicator) indicator.style.borderColor = '#e9c176';
                if (dot) dot.style.transform = 'scale(1)';
                if (outline) outline.style.borderColor = 'rgba(233, 193, 118, 0.22)';
              } else {
                label.style.backgroundColor = '';
                label.style.borderColor = '';
                label.style.boxShadow = '';
                if (indicator) indicator.style.borderColor = '';
                if (dot) dot.style.transform = '';
                if (outline) outline.style.borderColor = '';
              }
            });
          }

          optionLabels.forEach(function (label) {
            const radio = label.querySelector('input[type="radio"]');
            if (radio) {
              radio.addEventListener('change', updateSelectionStyles);
            }
          });

          updateSelectionStyles();
        });
    </script>
<script>
        document.addEventListener('DOMContentLoaded', function () {
          const form = document.querySelector('form[action*="script.google.com/macros"]');
          const submitFrame = document.getElementById('rsvp-submit-frame');
          const submitButton = form ? form.querySelector('button[type="submit"]') : null;
          let submitting = false;
          let fallbackTimer = null;

          if (!form || !submitFrame) {
            return;
          }

          form.target = 'rsvp_submit_frame';

          submitFrame.addEventListener('load', function () {
            if (!submitting) {
              return;
            }

            if (fallbackTimer) {
              window.clearTimeout(fallbackTimer);
            }

            window.location.href = 'confirmacao.html';
          });

          form.addEventListener('submit', function () {
            submitting = true;

            if (submitButton) {
              submitButton.disabled = true;
              submitButton.style.opacity = '0.85';
              submitButton.style.cursor = 'wait';
            }

            fallbackTimer = window.setTimeout(function () {
              if (!submitting) {
                return;
              }

              submitting = false;

              if (submitButton) {
                submitButton.disabled = false;
                submitButton.style.opacity = '';
                submitButton.style.cursor = '';
              }

              window.alert('Nao foi possivel concluir o envio agora. Tente novamente.');
            }, 15000);
          });
        });
    </script>
<iframe aria-hidden="true" id="rsvp-submit-frame" name="rsvp_submit_frame" style="display:none;" title="Envio de confirmacao"></iframe>
